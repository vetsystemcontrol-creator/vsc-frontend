<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Topbar — Vet System Control | Equine</title>

  <link rel="stylesheet" href="/assets/styles.css" />

  <style>
    :root{
      --vsc-green:#2fb26a;
      --vsc-border:#e8e8e8;
    }

    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; }

    /* Topbar premium (igual dashboard) */
    .vsc-topbar{
      height:74px;
      background:#fff;
      display:flex;
      align-items:center;
      padding:0 18px;
      box-sizing:border-box;
      border-bottom:1px solid var(--vsc-border);
      gap:16px;
    }

    /* Brand (esquerda) */
    .vsc-topbar__brand{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      min-width:360px;
      flex:0 0 360px;
    }
    .vsc-topbar__brand img{
      height:72px;
      margin:1px 0;
      width:auto;
      object-fit:contain;
      display:block;
    }

    /* Nav (centro) */
    .vsc-topbar__navwrap{
      flex:1;
      display:flex;
      justify-content:center;
      min-width:0;
    }
    .vsc-topbar__nav{
      display:flex;
      gap:28px;
      align-items:center;
      white-space:nowrap;
      overflow:auto;
      scrollbar-width:none;
    }
    .vsc-topbar__nav::-webkit-scrollbar{ display:none; }

    .vsc-topbar__nav a{
      font-size:13px;
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      color:#111;
      text-decoration:none;
      border:1px solid transparent;
      line-height:1;
    }
    .vsc-topbar__nav a:hover{
      background:rgba(47,178,106,.10);
      border-color:rgba(47,178,106,.14);
    }
    .vsc-topbar__nav a.is-active{
      background:#dff1e7;
      color:#1f7a4a;
    }

    /* Right (Logo A cliente) */
    .vsc-topbar__right{
      min-width:460px;
      flex:0 0 460px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:12px;
    }
    .vsc-topbar__right img{
      height:72px;
      margin:1px 0;
      width:auto;
      max-width:220px;
      object-fit:contain;
      display:none; /* liga somente se existir */
    }

    .vsc-userbox{
      display:flex;
      align-items:center;
      gap:10px;
      padding:6px 8px 6px 12px;
      border:1px solid rgba(0,0,0,.08);
      border-radius:999px;
      background:#fff;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
      min-width:0;
      max-width:320px;
      flex:0 1 auto;
    }
    .vsc-userbox__meta{
      display:flex;
      flex-direction:column;
      min-width:0;
      line-height:1.1;
    }
    .vsc-userbox__label{
      font-size:10px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:#6b7280;
    }
    .vsc-userbox__name{
      font-size:12px;
      font-weight:900;
      color:#111827;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:150px;
    }
    .vsc-userbox__role{
      font-size:11px;
      font-weight:700;
      color:#1f7a4a;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:150px;
    }
    .vsc-logout-btn{
      appearance:none;
      border:1px solid rgba(17,24,39,.12);
      background:#fff;
      color:#111827;
      font-weight:900;
      font-size:12px;
      padding:10px 12px;
      border-radius:999px;
      cursor:pointer;
      line-height:1;
      white-space:nowrap;
      transition:background .15s ease,border-color .15s ease,transform .15s ease;
    }
    .vsc-logout-btn:hover{
      background:#f9fafb;
      border-color:rgba(17,24,39,.22);
    }
    .vsc-logout-btn:active{ transform:translateY(1px); }
    .vsc-logout-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    /* Sync widget (premium, compacto) */
    .vsc-sync{
      display:flex;
      align-items:center;
      gap:10px;
      margin-right:12px;
      flex:0 0 auto;
    }
    .vsc-sync__btn{
      appearance:none;
      border:1px solid rgba(47,178,106,.18);
      background:rgba(47,178,106,.10);
      color:#1f7a4a;
      font-weight:800;
      font-size:12px;
      padding:10px 12px;
      border-radius:999px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:8px;
      line-height:1;
      user-select:none;
      white-space:nowrap;
    }
    .vsc-sync__btn:hover{ background:rgba(47,178,106,.14); }
    .vsc-sync__btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .vsc-sync__icon{ font-size:14px; }
    .vsc-sync__meta{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:900;
      font-size:12px;
      color:#111;
      padding:0 8px;
      border-left:1px solid rgba(0,0,0,.07);
    }
    .vsc-sync__dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:#e02424; /* offline default */
      box-shadow:0 0 0 2px rgba(0,0,0,.06) inset;
    }
    .vsc-sync__pending{
      min-width:18px;
      text-align:right;
      font-variant-numeric: tabular-nums;
    }

    /* Mobile: esconde label, mantém ícone + contador */
    @media (max-width: 640px){
      .vsc-topbar{ padding:0 12px; gap:10px; }
      .vsc-topbar__brand{ min-width:190px; flex:0 0 190px; }
      .vsc-topbar__right{ min-width:210px; flex:0 0 210px; gap:8px; }
      .vsc-sync{ margin-right:0; gap:8px; }
      .vsc-sync__label{ display:none; }
      .vsc-sync__btn{ padding:10px 10px; }
      .vsc-userbox{ padding:6px 8px; }
      .vsc-userbox__label, .vsc-userbox__role{ display:none; }
      .vsc-userbox__name{ max-width:86px; }
      .vsc-logout-btn{ padding:10px; }
    }

  </style>
</head>

<body>
  <header class="vsc-topbar">
    <div class="vsc-topbar__brand">
      <!-- Logo do sistema (fixa) -->
      <img id="vscLogoSistema" src="/assets/brand/vsc-logo-horizontal.png" alt="Vet System Control | Equine" />
    </div>

    <div class="vsc-topbar__navwrap">
      <nav class="vsc-topbar__nav" id="vscTopbarNav" aria-label="Navegacao principal">
        <a href="/dashboard" data-route="/dashboard">Dashboard</a>
        <a href="/clientes" data-route="/clientes">Clientes</a>
        <a href="/animais" data-route="/animais">Animais</a>
        <a href="/reproducao_equina" data-route="/reproducao_equina">Reprodução</a>
        <a href="/atendimentos" data-route="/atendimentos">Atendimentos</a>
        <a href="/produtos" data-route="/produtos">Produtos</a>
        <a href="/empresa" data-route="/empresa">Empresa</a>
      </nav>
    </div>    <div class="vsc-topbar__right">
      <!-- Sync (único para todo o sistema) -->
      <div class="vsc-sync" id="vscSyncWidget" aria-label="Sincronização">
        <button class="vsc-sync__btn" id="vscSyncBtn" type="button" title="Sincronizar agora (envia alterações pendentes quando houver conexão)">
          <span class="vsc-sync__icon" aria-hidden="true">⟳</span>
          <span class="vsc-sync__label">Sincronizar</span>
        </button>

        <div class="vsc-sync__meta" title="Status de rede e fila de alterações">
          <span class="vsc-sync__dot" id="vscNetDot" aria-hidden="true"></span>
          <span class="vsc-sync__pending" id="vscSyncPending">0</span>
        </div>
      </div>

      <div class="vsc-userbox" id="vscUserBox" aria-live="polite">
        <div class="vsc-userbox__meta">
          <span class="vsc-userbox__label">Sessão ativa</span>
          <span class="vsc-userbox__name" id="vscCurrentUserName">Usuário</span>
          <span class="vsc-userbox__role" id="vscCurrentUserRole">Perfil</span>
        </div>
        <button class="vsc-logout-btn" id="vscLogoutBtn" type="button" title="Encerrar sessão com segurança">Sair</button>
      </div>

      <!-- Logo A (cliente) -->
      <img id="vscLogoACliente" alt="Logo do Cliente" />
    </div>
  </header>

  <script>
    (function(){
      function safeParse(key){
        try{ return JSON.parse(localStorage.getItem(key) || "null"); }
        catch(e){ return null; }
      }

      function pickLogoSrc(obj){
        if(!obj) return null;

        // Aceita: DataURL (base64) OU URL/caminho (enterprise)
        var cands = [
          obj.__logoA, obj.logoA, obj.logo_a, obj.logo_data_url, obj.logoDataUrl,
          obj.logoCliente, obj.logo_cliente,
          obj.logoAUrl, obj.logo_a_url, obj.logo_url, obj.logoA_path, obj.logo_path
        ];

        for(var i=0;i<cands.length;i++){
          var v = cands[i];
          if(typeof v !== "string") continue;
          v = (v || "").trim();
          if(!v) continue;

          // DataURL base64
          if(v.indexOf("data:image/") === 0) return v;

          // URL absoluta
          if(/^https?:\/\//i.test(v)) return v;

          // URL relativa (padrão do sistema)
          if(v.indexOf("/") === 0) return v;

          // caminho relativo
          if(v.indexOf("./") === 0 || v.indexOf("../") === 0) return v;
        }
        return null;
      }

      // Regra do projeto: Logo A vem do Empresa (empresa.html)
      function getLogoAFromEmpresa(){
        var obj = safeParse("vsc_empresa_v1") || safeParse("vsc_empresa") || safeParse("vsc_branding");
        return pickLogoSrc(obj);
      }

      function applyLogoA(){
        var img = document.getElementById("vscLogoACliente");
        if(!img) return;

        // 1) tenta ler branding salvo (empresa)
        var logo = getLogoAFromEmpresa();

        // 2) fallback enterprise: endpoint canônico
        //    (permite upload/armazenamento no backend sem base64 no localStorage)
        if(!logo) logo = "/api/empresa/logoA";

        // garante que erro de carregamento não deixe "quadro vazio" permanente
        img.onerror = function(){
          try{ img.style.display = "none"; }catch(e){}
        };

        if(logo){
          // cache-buster só para URLs (não para DataURL)
          if(typeof logo === "string" && logo.indexOf("data:image/") !== 0){
            var sep = logo.indexOf("?") >= 0 ? "&" : "?";
            logo = logo + sep + "v=" + Date.now();
          }
          img.src = logo;
          img.style.display = "block";
        }else{
          img.style.display = "none";
        }
      }

      function setActive(){
        try{
          var path = (location.pathname || "").split("/").pop() || "";
          var nav = document.getElementById("vscTopbarNav");
          if(!nav) return;
          var links = nav.querySelectorAll("a[data-route]");
          for(var i=0;i<links.length;i++){
            var a = links[i];
            a.classList.toggle("is-active", a.getAttribute("data-route") === path);
          }
        }catch(e){}
      }

      function getAuthApi(){
        try{ if(window.VSC_AUTH) return window.VSC_AUTH; }catch(e){}
        try{ if(window.parent && window.parent !== window && window.parent.VSC_AUTH) return window.parent.VSC_AUTH; }catch(e){}
        try{ if(window.top && window.top !== window && window.top.VSC_AUTH) return window.top.VSC_AUTH; }catch(e){}
        return null;
      }

      function userDisplayName(user){
        if(!user) return "Não autenticado";
        var prof = user.professional || {};
        var parts = [prof.nome, prof.nome_completo, user.username, user.id];
        for(var i=0;i<parts.length;i++){
          var v = parts[i];
          if(typeof v === "string" && v.trim()) return v.trim();
        }
        return "Usuário ativo";
      }

      function userRoleName(user){
        if(!user) return "Sem sessão";
        var role = (user.role || "").trim();
        return role || "Perfil não identificado";
      }

      async function renderSessionInfo(){
        var nameEl = document.getElementById("vscCurrentUserName");
        var roleEl = document.getElementById("vscCurrentUserRole");
        var btn = document.getElementById("vscLogoutBtn");
        if(!nameEl || !roleEl || !btn) return;

        var auth = getAuthApi();
        if(!auth || typeof auth.getCurrentUser !== "function") {
          nameEl.textContent = "Sessão indisponível";
          roleEl.textContent = "Auth não carregado";
          btn.disabled = true;
          return;
        }

        try{
          if(typeof auth.bootstrap === "function") await auth.bootstrap();
        }catch(e){}

        try{
          var user = await auth.getCurrentUser();
          nameEl.textContent = userDisplayName(user);
          roleEl.textContent = userRoleName(user);
          btn.disabled = !user;
        }catch(e){
          nameEl.textContent = "Sessão indisponível";
          roleEl.textContent = "Falha ao ler usuário";
          btn.disabled = true;
        }
      }

      async function handleLogout(){
        var btn = document.getElementById("vscLogoutBtn");
        if(!btn || btn.disabled) return;

        var ok = true;
        try{ ok = window.confirm("Deseja encerrar sua sessão com segurança?"); }catch(e){}
        if(!ok) return;

        var auth = getAuthApi();
        if(!auth || typeof auth.logout !== "function"){
          try{ alert("Não foi possível localizar o módulo de autenticação para sair."); }catch(e){}
          return;
        }

        var prev = btn.textContent;
        btn.disabled = true;
        btn.textContent = "Saindo...";

        try{
          await auth.logout();
        }catch(e){
          console.error("[VSC_TOPBAR] logout falhou", e);
        } finally {
          try{
            var target = "/login.html?logout=1";
            if(window.top && window.top !== window){
              window.top.location.replace(target);
            }else{
              window.location.replace(target);
            }
          }catch(e){
            window.location.href = "/login.html?logout=1";
          }
        }
      }

      function wireLogout(){
        var btn = document.getElementById("vscLogoutBtn");
        if(!btn) return;
        btn.addEventListener("click", function(){
          handleLogout();
        });
      }

      document.addEventListener("DOMContentLoaded", function(){
        setActive();
        applyLogoA();
        wireNavToTop(); // VSC: navegar no TOP quando em iframe
        wireLogout();
        renderSessionInfo();
      });

      // Atualiza branding quando outra tela salvar no localStorage (ex.: empresa.html)
      window.addEventListener("storage", function(ev){
        try{
          if(!ev) return;
          if(ev.key === "vsc_empresa_v1" || ev.key === "vsc_empresa" || ev.key === "vsc_branding"){
            applyLogoA();
          }
          if(ev.key === "vsc_session_id"){
            renderSessionInfo();
          }
        }catch(e){}
      });

      // expor para telas que quiserem reaplicar apos salvar empresa
            
      // VSC: navegar no TOP quando em iframe (evita abrir paginas dentro do frame)
      function wireNavToTop(){
        try{
          var nav = document.getElementById("vscTopbarNav");
          if(!nav) return;
          nav.addEventListener("click", function(ev){
            var el = ev.target;
            while(el && el !== nav && (!el.tagName || el.tagName.toLowerCase() !== "a")) el = el.parentNode;
            if(!el || el === nav) return;
            if(window.top && window.top !== window){
              ev.preventDefault();
              window.top.location.href = el.getAttribute("href");
            }
          }, true);
        }catch(e){}
      }
      window.VSC_APPLY_BRANDING_TOPBAR = applyLogoA;
    })();
  </script>
<script src="vendor/jszip.min.js"></script>

  <script src="modules/vsc_db.js"></script>
  <script src="modules/vsc-outbox-relay.js"></script>
  <script src="modules/vsc-sync-ui.js"></script>

  <script src="modules/auth.js" charset="utf-8"></script>
  <script src="modules/auth_guard.js" charset="utf-8"></script>
<script src="modules/ui-global.js"></script>
</body>
</html>
