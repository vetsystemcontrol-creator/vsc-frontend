<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Topbar Oficial — Vet System Control | Equine</title>
  <style>
    :root{
      --vsc-green:#2fb26a;
      --vsc-green-dark:#1f7a4a;
      --vsc-border:#e8e8e8;
      --vsc-bg:#ffffff;
      --vsc-text:#111827;
      --vsc-muted:#6b7280;
      --vsc-danger:#dc2626;
      --vsc-topbar-h:94px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:var(--vsc-topbar-h);
      overflow:hidden;
      background:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--vsc-text);
    }
    body{border-bottom:1px solid var(--vsc-border)}
    .vsc-topbar{height:var(--vsc-topbar-h);background:linear-gradient(180deg,#fff,#f6fbf8);display:flex;align-items:center;padding:0 14px;gap:12px;width:100%;box-shadow:0 10px 28px rgba(15,23,42,.07)}
    .vsc-topbar__brand{display:flex;align-items:center;justify-content:flex-start;min-width:170px;flex:0 1 190px;min-height:68px}
    .vsc-topbar__brand img{display:block;height:60px;width:auto;max-width:100%;object-fit:contain;pointer-events:none;user-select:none}
    .vsc-topbar__navwrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;min-width:0;}
    .vsc-topbar__nav{display:flex;align-items:center;justify-content:center;gap:10px;white-space:nowrap;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;padding:4px 0 4px;margin:0 auto;min-width:0;max-width:100%}
    .vsc-topbar__nav::-webkit-scrollbar{display:none}
    .vsc-topbar__nav a{font-size:13px;font-weight:900;padding:12px 14px;border-radius:999px;color:#173424;text-decoration:none;border:1px solid transparent;line-height:1;flex:0 0 auto;transition:all .15s ease;display:inline-flex;align-items:center;justify-content:center;min-height:42px}
    .vsc-topbar__nav a:hover{background:rgba(47,178,106,.10);border-color:rgba(47,178,106,.14)}
    .vsc-topbar__nav a.is-active{background:linear-gradient(180deg,#e8f7ee,#dff1e7);color:var(--vsc-green-dark);box-shadow:inset 0 0 0 1px rgba(31,122,74,.10), 0 8px 18px rgba(47,178,106,.10)}
    .vsc-topbar__right{min-width:0;flex:0 1 340px;display:flex;align-items:center;justify-content:flex-end;gap:10px;min-height:72px}
    .vsc-logo-a{display:none;height:58px;width:auto;max-width:180px;object-fit:contain;border:0;background:transparent;user-select:none}
    .vsc-sync{display:flex;flex-direction:column;align-items:flex-start;gap:4px;flex:0 0 164px;min-width:164px}
    .vsc-sync__btn{appearance:none;border:1px solid rgba(47,178,106,.18);background:rgba(47,178,106,.10);color:var(--vsc-green-dark);font-weight:800;font-size:12px;padding:10px 12px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:0;line-height:1;white-space:nowrap;min-width:42px;justify-content:center}
    .vsc-sync__btn:hover{background:rgba(47,178,106,.14)}
    .vsc-sync__btn:disabled{opacity:.55;cursor:not-allowed}
    .vsc-sync__icon{font-size:14px}
    .vsc-sync__meta{display:flex;align-items:center;gap:6px;font-weight:900;font-size:12px;color:#111;padding:0 4px;min-height:18px}
    .vsc-sync__dot{width:10px;height:10px;border-radius:999px;background:var(--vsc-danger);box-shadow:0 0 0 2px rgba(0,0,0,.06) inset}
    .vsc-sync__pending{min-width:18px;text-align:right;font-variant-numeric:tabular-nums}
    .vsc-sync__note{font-size:11px;line-height:1.1;color:var(--vsc-muted);padding-left:2px;max-width:164px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .vsc-userbox{display:flex;align-items:center;gap:6px;padding:6px 7px 6px 12px;border:1px solid rgba(0,0,0,.08);border-radius:999px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.04);min-width:0;max-width:150px;flex:0 1 auto}
    .vsc-userbox__meta{display:flex;flex-direction:column;min-width:0;line-height:1.1}
    .vsc-userbox__label{display:none;font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--vsc-muted)}
    .vsc-userbox__name{font-size:12px;font-weight:900;color:var(--vsc-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
    .vsc-userbox__role{display:none;font-size:11px;font-weight:700;color:var(--vsc-green-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
    .vsc-logout-btn{appearance:none;border:1px solid rgba(17,24,39,.12);background:#fff;color:var(--vsc-text);font-weight:900;font-size:12px;padding:9px 10px;border-radius:999px;cursor:pointer;line-height:1;white-space:nowrap;transition:background .15s ease,border-color .15s ease,transform .15s ease;min-width:38px}
    .vsc-logout-btn:hover{background:#f9fafb;border-color:rgba(17,24,39,.22)}
    .vsc-logout-btn:active{transform:translateY(1px)}
    .vsc-logout-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    @media (max-width:960px){
      .vsc-topbar{padding:0 10px;gap:10px}
      .vsc-topbar__brand{min-width:144px;flex:0 1 144px}
      .vsc-topbar__brand img{height:60px;max-width:200px}
      .vsc-topbar__right{min-width:0;flex:0 1 300px;gap:6px}
      .vsc-sync__label,.vsc-userbox__label,.vsc-userbox__role{display:none}
      .vsc-sync{flex-basis:132px;min-width:132px}
      .vsc-sync__note{max-width:132px}
      .vsc-userbox__name{max-width:52px}
      .vsc-logo-a{max-width:120px;height:60px}
    }
  </style>
</head>
<body>
  <header class="vsc-topbar">
    <div class="vsc-topbar__brand">
      <img id="vscLogoSistema" src="assets/brand/vsc-logo-horizontal.png" alt="Vet System Control | Equine" />
    </div>
    <div class="vsc-topbar__navwrap">
      <nav class="vsc-topbar__nav" id="vscTopbarNav" aria-label="Navegação principal">
        <a href="dashboard.html" data-route="dashboard.html">Dashboard</a>
        <a href="clientes.html" data-route="clientes.html">Clientes</a>
        <a href="animais.html" data-route="animais.html">Animais</a>
        <a href="reproducao_equina.html" data-route="reproducao_equina.html">Reprodução</a>
        <a href="atendimentos.html" data-route="atendimentos.html">Atendimentos</a>
        <a href="produtos.html" data-route="produtos.html">Produtos</a>
        <a href="empresa.html" data-route="empresa.html">Empresa</a>
      </nav>
    </div>
    <div class="vsc-topbar__right">
      <div class="vsc-sync" id="vscSyncWidget" aria-label="Sincronização">
        <button class="vsc-sync__btn" id="vscSyncBtn" type="button" title="Sincronizar agora">
          <span class="vsc-sync__icon" aria-hidden="true">⟳</span>
        </button>
        <div class="vsc-sync__meta" title="Status de rede e fila de alterações">
          <span class="vsc-sync__dot" id="vscNetDot" aria-hidden="true"></span>
          <span class="vsc-sync__pending" id="vscSyncPending">0</span>
        </div>
        <div class="vsc-sync__note" id="vscSyncNote" aria-live="polite"></div>
      </div>
      <div class="vsc-userbox" id="vscUserBox" aria-live="polite">
        <div class="vsc-userbox__meta">
          <span class="vsc-userbox__label">Sessão ativa</span>
          <span class="vsc-userbox__name" id="vscCurrentUserName">Não autenticado</span>
          <span class="vsc-userbox__role" id="vscCurrentUserRole">Sem sessão</span>
        </div>
        <button class="vsc-logout-btn" id="vscLogoutBtn" type="button" title="Encerrar sessão com segurança">⎋</button>
      </div>
      <img id="vscLogoACliente" class="vsc-logo-a" alt="Logo A da empresa" />
    </div>
  </header>

  <script src="vendor/jszip.min.js"></script>
  <script src="modules/vsc_db.js"></script>
  <script src="modules/vsc-cloud-sync.js?v=20260309h"></script>
  <script src="modules/vsc-outbox-relay.js"></script>
  <script src="modules/vsc-sync-ui.js"></script>
  <script src="modules/auth.js" charset="utf-8"></script>
  <script src="modules/auth_guard.js" charset="utf-8"></script>
  <script src="modules/ui-global.js?v=20260307f"></script>
  <script>
    (function(){
      "use strict";

      var EMPRESA_KEY = "vsc_empresa_v1";
      var LOGOUT_FLAG_KEY = "vsc_logout_in_progress";
      var LOGIN_TARGET = "login.html?logout=1";

      function getTopWindow(){
        try{ if(window.top && window.top !== window) return window.top; }catch(_){ }
        return window;
      }

      function getScopedStorage(name){
        try{
          var tw = getTopWindow();
          if(tw && tw[name]) return tw[name];
        }catch(_){ }
        try{ return window[name] || null; }catch(_){ return null; }
      }

      function getTopSessionStorage(){ return getScopedStorage("sessionStorage"); }
      function getTopLocalStorage(){ return getScopedStorage("localStorage"); }

      function setLogoutInProgress(){
        try{
          var ss = getTopSessionStorage();
          if(ss) ss.setItem(LOGOUT_FLAG_KEY, String(Date.now()));
        }catch(_){ }
      }

      function clearLogoutInProgress(){
        try{
          var ss = getTopSessionStorage();
          if(ss) ss.removeItem(LOGOUT_FLAG_KEY);
        }catch(_){ }
      }

      function normalizeFile(pathname){
        var p = String(pathname || "").split("?")[0].split("#")[0];
        p = p.substring(p.lastIndexOf("/") + 1);
        return p || "dashboard.html";
      }

      function setActiveFromCurrentContext(){
        var route = "dashboard.html";
        try{ route = normalizeFile(getTopWindow().location.pathname || ""); }catch(_){ route = normalizeFile(location.pathname || ""); }
        var nav = document.getElementById("vscTopbarNav");
        if(!nav) return;
        nav.querySelectorAll("a[data-route]").forEach(function(a){
          a.classList.toggle("is-active", a.getAttribute("data-route") === route);
        });
      }

      function wireNavToTop(){
        var nav = document.getElementById("vscTopbarNav");
        if(!nav) return;
        nav.addEventListener("click", function(ev){
          var el = ev.target;
          while(el && el !== nav && (!el.tagName || el.tagName.toLowerCase() !== "a")) el = el.parentNode;
          if(!el || el === nav) return;
          var href = el.getAttribute("href");
          if(!href) return;
          try{
            ev.preventDefault();
            getTopWindow().location.href = href;
          }catch(_){ }
        });
      }

      function safeParse(v){ try{ return JSON.parse(v); }catch(_){ return null; } }

      function loadLogoA(){
        var img = document.getElementById("vscLogoACliente");
        if(!img) return;
        try{
          var raw = getTopLocalStorage() ? getTopLocalStorage().getItem(EMPRESA_KEY) : localStorage.getItem(EMPRESA_KEY);
          var obj = safeParse(raw);
          var src = obj && typeof obj.__logoA === "string" ? obj.__logoA : "";
          if(src && src.indexOf("data:image/") === 0){ img.src = src; img.style.display = "block"; }
          else { img.removeAttribute("src"); img.style.display = "none"; }
        }catch(_){ img.removeAttribute("src"); img.style.display = "none"; }
      }

      function getAuthApi(){
        try{
          var tw = getTopWindow();
          if(tw && tw.VSC_AUTH) return tw.VSC_AUTH;
        }catch(_){ }
        try{ if(window.VSC_AUTH) return window.VSC_AUTH; }catch(_){ }
        try{ if(window.Auth) return window.Auth; }catch(_){ }
        return null;
      }

      async function getCurrentUserSafe(){
        var auth = getAuthApi();
        if(!auth) return null;
        try{ if(typeof auth.bootstrap === "function") await auth.bootstrap(); }catch(_){ }
        try{
          if(typeof auth.getCurrentUser === "function") return await auth.getCurrentUser();
        }catch(_){ }
        try{
          if(typeof auth.currentUser === "function") return auth.currentUser();
        }catch(_){ }
        return null;
      }

      async function updateSessionBox(){
        var nameEl = document.getElementById("vscCurrentUserName");
        var roleEl = document.getElementById("vscCurrentUserRole");
        if(!nameEl || !roleEl) return;
        var user = null;
        try{ user = await getCurrentUserSafe(); }catch(_){ user = null; }
        if(!user){
          try{ user = JSON.parse((getTopLocalStorage() || localStorage).getItem("vsc_user") || "null"); }catch(_){ user = null; }
        }
        nameEl.textContent = user && (user.nome || user.name || user.usuario || user.username || user.email) ? (user.nome || user.name || user.usuario || user.username || user.email) : "Não autenticado";
        roleEl.textContent = user && (user.perfil || user.role || user.tipo) ? (user.perfil || user.role || user.tipo) : "Sem sessão";
      }

      function safeTopReplace(url){
        try{ getTopWindow().location.replace(url); return true; }catch(_){ }
        try{ getTopWindow().location.href = url; return true; }catch(_){ }
        try{ location.replace(url); return true; }catch(_){ }
        try{ location.href = url; return true; }catch(_){ }
        return false;
      }

      async function handleLogout(){
        var btn = document.getElementById("vscLogoutBtn");
        if(!btn || btn.disabled) return;
        var auth = getAuthApi();
        var prev = btn.textContent;
        btn.disabled = true;
        btn.textContent = "Saindo...";
        setLogoutInProgress();

        try{
          if(auth && typeof auth.logout === "function"){
            await auth.logout();
          } else {
            try{ (getTopLocalStorage() || localStorage).removeItem("vsc_session_id"); }catch(_){ }
            try{ (getTopLocalStorage() || localStorage).removeItem("vsc_user"); }catch(_){ }
          }
        }catch(e){
          console.error("[VSC_TOPBAR] falha no logout", e);
        }

        safeTopReplace(LOGIN_TARGET);

        setTimeout(function(){
          clearLogoutInProgress();
          try{ btn.disabled = false; btn.textContent = prev; }catch(_){ }
        }, 1500);
      }

      function bindLogout(id){
        var btn = document.getElementById(id);
        if(!btn) return;
        btn.addEventListener("click", function(ev){
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(_){ }
          handleLogout();
        });
      }

      function updatePending(n){
        ["vscSyncPending","vscMobilePending"].forEach(function(id){
          var el = document.getElementById(id);
          if(el) el.textContent = String(Number(n || 0));
        });
      }

      function bindSync(id){
        var btn = document.getElementById(id);
        if(!btn || btn.dataset.vscSyncBound === "1") return;
        btn.dataset.vscSyncBound = "1";
        btn.addEventListener("click", async function(ev){
          try{ ev.preventDefault(); ev.stopPropagation(); }catch(_){ }
          try{
            if(window.VSC_CLOUD_SYNC && typeof window.VSC_CLOUD_SYNC.manualSync === "function") {
              await window.VSC_CLOUD_SYNC.manualSync();
              return;
            }
            if(window.VSC_CLOUD_SYNC && typeof window.VSC_CLOUD_SYNC.syncNow === "function") {
              await window.VSC_CLOUD_SYNC.syncNow();
              return;
            }
            if(window.VSC_RELAY && typeof window.VSC_RELAY.syncNow === "function") {
              await window.VSC_RELAY.syncNow();
              return;
            }
          }catch(err){
            try{ console.error("[VSC_TOPBAR] falha no sync manual", err); }catch(_){ }
          }
        });
      }

      function onProgress(ev){
        var d = (ev && ev.detail) || {};
        updatePending(d.pending || 0);
      }

      function syncInitialStatus(){
        try{
          if(window.VSC_RELAY && typeof window.VSC_RELAY.status === "function") {
            onProgress({ detail: window.VSC_RELAY.status() });
          }
        }catch(_){ }
      }

      function onStorage(ev){
        if(!ev) return;
        if(ev.key === EMPRESA_KEY) loadLogoA();
        if(ev.key === "vsc_user" || ev.key === "vsc_session_id") updateSessionBox();
      }

      function onMessage(ev){
        var data = ev && ev.data;
        if(!data || typeof data !== "object") return;
        if(data.type === "VSC_NAV_UPDATE") setActiveFromCurrentContext();
        if(data.type === "VSC_BRANDING_UPDATE") loadLogoA();
        if(data.type === "VSC_SESSION_UPDATE") updateSessionBox();
      }

      function boot(){
        setActiveFromCurrentContext();
        wireNavToTop();
        loadLogoA();
        updateSessionBox();
        bindLogout("vscLogoutBtn");
        bindSync("vscSyncBtn");
        syncInitialStatus();
        window.addEventListener("storage", onStorage);
        window.addEventListener("message", onMessage);
        window.addEventListener("vsc:sync-progress", onProgress);
      }

      if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot, {once:true});
      else boot();
    })();
  </script>
</body>
</html>
